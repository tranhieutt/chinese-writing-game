<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luyện Viết Chữ Hán</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Nunito+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/chinese-writing-game.css">
</head>
<body>

<div class="header">
  <div class="header-owl">🦉</div>
  <div class="header-title">Luyện Viết <span>Chữ Hán</span></div>
  <div class="header-sub">Học viết đúng thứ tự nét bút · 練字</div>
</div>

<div class="container">

  <!-- Score strip -->
  <div class="score-panel">
    <div class="score-item">
      <div class="score-num" id="score-correct">0</div>
      <div class="score-label">Nét đúng</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="score-attempts">0</div>
      <div class="score-label">Lần thử</div>
    </div>
    <div class="score-item">
      <div class="score-num" id="score-chars">0</div>
      <div class="score-label">Chữ học</div>
    </div>
  </div>

  <!-- Group tabs -->
  <div class="group-tabs" id="group-tabs"></div>

  <!-- Character selector -->
  <div class="char-selector" id="char-selector"></div>

  <!-- Main card -->
  <div class="main-card">
    <div class="mode-badge badge-preview" id="mode-badge">Sẵn sàng</div>
    
    <!-- Char Info -->
    <div class="char-info">
      <div class="char-display" id="char-display">-</div>
      <div class="char-pinyin" id="char-pinyin">-</div>
      <div class="char-meaning" id="char-meaning">-</div>
      <div class="stroke-count-badge" id="stroke-count-badge">0 nét</div>
    </div>

    <!-- Canvas -->
    <div class="canvas-wrapper">
      <div id="hanzi-container"></div>
      
      <!-- Complete Overlay -->
      <div class="complete-overlay" id="complete-overlay">
        <div class="complete-star">⭐</div>
        <div class="complete-text">Hoàn thành!</div>
        <div class="complete-sub" id="complete-sub">0 nét · 0 lần sai</div>
      </div>
    </div>

    <!-- Stroke hint dots -->
    <div class="stroke-hint" id="stroke-hint"></div>

    <!-- Status Box -->
    <div class="status-box status-idle" id="status-box">
      Nhấn "Xem nét" để xem thứ tự, hoặc "Luyện viết" để bắt đầu
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span>Tiến độ viết</span>
        <span id="progress-text">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
    </div>

    <div class="sep"></div>

    <!-- Controls -->
    <div class="controls">
      <button id="btn-animate" class="btn btn-secondary" onclick="animateStrokes()">
        🖌 Xem nét
      </button>
      <button id="btn-quiz" class="btn btn-primary" onclick="startQuiz()">
        ✏️ Luyện viết
      </button>
      <button id="btn-reset" class="btn btn-ghost" onclick="resetChar()">
        🔄 Làm lại
      </button>
    </div>
  </div>

</div>

<!-- Data and Game Logic scripts -->
<script src="js/vocab-groups.js"></script>
<script src="js/app.js"></script>
</body>
</html>
